# ==========================================
# MASTER BLUEPRINT (DRY Pattern)
# ==========================================
x-python-base: &python-base
  build: ./python-rag-service
  image: traffic-rag-core:latest
  depends_on:
    db-python:
      condition: service_healthy
    vector-store:
      condition: service_started
    graph-store:
      condition: service_started
  environment:
    PYTHON_DATABASE_URL: ${PYTHON_DATABASE_URL}
    QDRANT_HOST: vector-store 
    QDRANT_PORT: ${QDRANT_PORT}
    NEO4J_URI: ${NEO4J_URI}
    NEO4J_USER: ${NEO4J_USER}
    NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    OPENAI_API_KEY: ${OPENAI_API_KEY}
    HF_TOKEN: ${HF_TOKEN}
    HF_HOME: /app/cache/huggingface
    # Windows Docker Desktop specific bridge
    OLLAMA_HOST: http://host.docker.internal:11434 
  volumes:
    # 1. Live Data Tunnel
    - ./python-rag-service/data:/app/data
    # 2. Live Code Tunnels for Hot-Reloading
    - ./python-rag-service/app:/app/app
    - ./python-rag-service/main.py:/app/main.py
    - ./python-rag-service/cache:/app/cache
    # 3. Volume Exclusion Pattern (Blocks Windows cache/IDE files)
    - /app/app/__pycache__
    - /app/app/.idea
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  # ==========================================
  # INFRASTRUCTURE DATABASES
  # ==========================================
  db-spring:
    image: postgres:17-alpine
    container_name: db-spring
    environment:
      POSTGRES_USER: ${SPRING_DB_USER}
      POSTGRES_PASSWORD: ${SPRING_DB_PASSWORD}
      POSTGRES_DB: ${SPRING_DB_NAME}
    ports:
      - "${SPRING_DB_PORT}:5432"
    volumes:
      - spring_db_data:/var/lib/postgresql/data

  db-python:
    image: postgres:17-alpine
    container_name: db-python
    environment:
      POSTGRES_USER: ${PYTHON_DB_USER}
      POSTGRES_PASSWORD: ${PYTHON_DB_PASSWORD}
      POSTGRES_DB: ${PYTHON_DB_NAME}
    ports:
      - "${PYTHON_DB_PORT}:5432"
    volumes:
      - python_metadata_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PYTHON_DB_USER} -d ${PYTHON_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  vector-store:
    image: qdrant/qdrant:latest
    container_name: qdrant-vector
    ports:
      - "${QDRANT_PORT}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  graph-store:
    image: neo4j:latest
    container_name: neo4j-graph
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  # ==========================================
  # THE AI MICROSERVICES
  # ==========================================
  
  # The Web Server (Producer)
  python-rag-service:
    <<: *python-base
    container_name: python-rag-service
    # Uvicorn's native hot-reloading
    command: >
      bash -c "procrastinate --app=app.db.queue.task_app schema --apply && 
      python3 -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "${PYTHON_API_PORT}:8000"

  # The Background ML Engine (Consumer)
  python-rag-worker:
    <<: *python-base
    container_name: python-rag-worker
    # Watchdog wrapper for Procrastinate hot-reloading
    command: >
      watchmedo auto-restart 
      --directory=./app 
      --pattern=*.py 
      --recursive 
      -- procrastinate --app=app.db.queue.task_app worker

  # ==========================================
  # JAVA & REACT PLACEHOLDERS
  # ==========================================
  spring-gateway:
    build: ./spring-gateway
    container_name: spring-gateway
    depends_on:
      - db-spring
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DB_PASSWORD}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
    ports:
      - "${SPRING_API_PORT}:8080"

  frontend-ui:
    build: ./frontend-ui
    container_name: frontend-ui
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  spring_db_data:
  python_metadata_data:
  qdrant_data:
  neo4j_data: