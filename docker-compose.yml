version: '3.8'

# ==========================================
# MASTER BLUEPRINT (DRY Pattern)
# ==========================================
x-python-base: &python-base
  build: ./python-rag-service
  depends_on:
    db-python:
      condition: service_healthy
    vector-store:
      condition: service_started
    graph-store:
      condition: service_healthy
  environment:
    PYTHON_DATABASE_URL: ${PYTHON_DATABASE_URL}
    QDRANT_HOST: vector-store 
    QDRANT_PORT: ${QDRANT_PORT}
    NEO4J_URI: ${NEO4J_URI}
    NEO4J_USER: ${NEO4J_USER}
    NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    OPENAI_API_KEY: ${OPENAI_API_KEY}
    HF_TOKEN: ${HF_TOKEN}
    HF_HOME: /app/cache/huggingface
    OLLAMA_HOST: http://host.docker.internal:11434 
  volumes:
    - ./python-rag-service/data:/app/data
    - ./python-rag-service/src/app:/app/src/app
    - ./python-rag-service/main.py:/app/main.py
    - ./python-rag-service/cache:/app/cache
    - ./python-rag-service/src/cli:/app/src/cli
    - /app/src/app/__pycache__
    - /app/.idea
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  db-spring:
    image: postgres:17-alpine
    container_name: db-spring
    environment:
      POSTGRES_USER: ${SPRING_DB_USER}
      POSTGRES_PASSWORD: ${SPRING_DB_PASSWORD}
      POSTGRES_DB: ${SPRING_DB_NAME}
    ports:
      - "${SPRING_DB_PORT}:5432"
    volumes:
      - spring_db_data:/var/lib/postgresql/data

  db-python:
    image: postgres:17-alpine
    container_name: db-python
    environment:
      POSTGRES_USER: ${PYTHON_DB_USER}
      POSTGRES_PASSWORD: ${PYTHON_DB_PASSWORD}
      POSTGRES_DB: ${PYTHON_DB_NAME}
    ports:
      - "${PYTHON_DB_PORT}:5432"
    volumes:
      - python_metadata_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PYTHON_DB_USER} -d ${PYTHON_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  vector-store:
    image: qdrant/qdrant:latest
    container_name: qdrant-vector
    ports:
      - "${QDRANT_PORT}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  graph-store:
    image: neo4j:latest
    container_name: neo4j-graph
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  python-rag-service:
    <<: *python-base
    container_name: python-rag-service
    command: >
      sh -c "python3 -m procrastinate --app=src.app.core.worker_app.task_app schema --apply || echo 'Procrastinate schema already exists, skipping...' && 
      exec python3 -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "${PYTHON_API_PORT}:8000"

  python-rag-worker:
    <<: *python-base
    container_name: python-rag-worker
    command: >
      sh -c "exec watchmedo auto-restart --directory=./src/app --pattern=*.py --recursive -- python3 -m procrastinate --app=src.app.core.worker_app.task_app worker"

volumes:
  spring_db_data:
  python_metadata_data:
  qdrant_data:
  neo4j_data: